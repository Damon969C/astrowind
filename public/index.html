<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>脚本与工具下载</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f6f8;
      --panel: #ffffff;
      --text: #17202a;
      --muted: #5d6876;
      --line: #d9dee7;
      --soft: #eef2f6;
      --accent: #166534;
      --accent-strong: #0f4f2a;
      --shadow: 0 14px 34px rgba(23, 32, 42, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.5;
    }

    main {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
      padding: 36px 0;
    }

    header {
      display: grid;
      gap: 14px;
      margin-bottom: 26px;
      padding-bottom: 22px;
      border-bottom: 1px solid var(--line);
    }

    h1,
    h2,
    h3,
    p {
      margin: 0;
    }

    h1 {
      font-size: clamp(30px, 5vw, 48px);
      line-height: 1.05;
      letter-spacing: 0;
    }

    .lead {
      max-width: 760px;
      color: var(--muted);
      font-size: 17px;
    }

    .stats {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      color: var(--muted);
      font-size: 14px;
    }

    .stat {
      display: inline-flex;
      align-items: center;
      min-height: 32px;
      padding: 6px 10px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--panel);
    }

    .category-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 14px;
    }

    .category-card {
      position: relative;
      display: grid;
      min-height: 220px;
      padding: 18px;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: inherit;
      text-decoration: none;
      box-shadow: var(--shadow);
    }

    .category-card::before {
      content: "";
      position: absolute;
      inset: 0 auto 0 0;
      width: 5px;
      background: var(--card-accent, var(--accent));
    }

    .category-card:hover,
    .category-card:focus {
      border-color: var(--card-accent, var(--accent));
      outline: none;
      transform: translateY(-1px);
    }

    .card-body {
      display: grid;
      align-content: space-between;
      gap: 24px;
      padding-left: 6px;
    }

    .category-title {
      margin-bottom: 8px;
      font-size: 20px;
      letter-spacing: 0;
    }

    .category-description {
      color: var(--muted);
      font-size: 14px;
    }

    .category-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      color: var(--muted);
      font-size: 13px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 4px 9px;
      border-radius: 999px;
      background: var(--soft);
      color: #263241;
      font-weight: 700;
    }

    .panel-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-top: 18px;
    }

    .panel {
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
    }

    .panel h2 {
      margin-bottom: 8px;
      font-size: 18px;
      letter-spacing: 0;
    }

    .panel p {
      color: var(--muted);
    }

    pre {
      margin: 12px 0 0;
      padding: 12px;
      overflow-x: auto;
      border-radius: 6px;
      background: var(--soft);
      font-size: 14px;
    }

    code {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }

    .plain-link {
      color: var(--accent-strong);
      font-weight: 700;
    }

    .state {
      padding: 18px;
      border: 1px dashed var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: var(--muted);
    }

    @media (max-width: 920px) {
      .category-grid,
      .panel-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 620px) {
      main {
        width: min(100% - 24px, 1120px);
        padding: 24px 0;
      }

      .category-grid,
      .panel-grid {
        grid-template-columns: 1fr;
      }

      .category-card {
        min-height: 180px;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>脚本与工具下载</h1>
      <p class="lead">按用途分类托管常用脚本、Windows 工具、注册表文件和图片素材，适合直接部署到 Cloudflare Pages 或其他静态托管服务。</p>
      <div class="stats" id="stats" aria-live="polite">
        <span class="stat">正在加载资源清单</span>
      </div>
    </header>

    <section class="category-grid" id="categoryGrid" aria-label="下载分类">
      <p class="state">正在读取 downloads/manifest.json。</p>
    </section>

    <noscript>
      <p class="state">此页面需要 JavaScript 读取下载清单。你仍可直接访问 public/downloads/ 下的分类目录。</p>
    </noscript>

    <section class="panel-grid" aria-label="辅助信息">
      <article class="panel">
        <h2>校验</h2>
        <p>完整校验表：<a class="plain-link" href="downloads/SHA256SUMS.txt" download>SHA256SUMS.txt</a></p>
        <pre><code>sha256sum -c SHA256SUMS.txt</code></pre>
      </article>

      <article class="panel">
        <h2>Cloudflare Pages 部署</h2>
        <p>把 <code>public/</code> 作为静态资产目录上传即可。</p>
        <pre><code>npx wrangler pages deploy public</code></pre>
      </article>
    </section>
  </main>

  <script>
    const manifestUrl = "downloads/manifest.json";
    const categoryGrid = document.querySelector("#categoryGrid");
    const stats = document.querySelector("#stats");

    function formatBytes(bytes) {
      const units = ["B", "KB", "MB", "GB"];
      let value = Number(bytes);
      let unitIndex = 0;
      while (value >= 1024 && unitIndex < units.length - 1) {
        value /= 1024;
        unitIndex += 1;
      }
      return `${value >= 10 || unitIndex === 0 ? value.toFixed(0) : value.toFixed(1)} ${units[unitIndex]}`;
    }

    function categoryHref(id) {
      return `category.html?type=${encodeURIComponent(id)}`;
    }

    function totalSize(category) {
      return category.items.reduce((sum, item) => sum + item.size, 0);
    }

    function render(manifest) {
      const categories = manifest.categories || [];
      const fileCount = categories.reduce((sum, category) => sum + category.items.length, 0);
      const byteCount = categories.reduce((sum, category) => sum + totalSize(category), 0);

      stats.innerHTML = "";
      [
        `${categories.length} 个分类`,
        `${fileCount} 个文件`,
        `${formatBytes(byteCount)} 总大小`,
        `更新 ${manifest.updated || "未知"}`
      ].forEach((text) => {
        const item = document.createElement("span");
        item.className = "stat";
        item.textContent = text;
        stats.append(item);
      });

      categoryGrid.innerHTML = "";
      categories.forEach((category) => {
        const link = document.createElement("a");
        link.className = "category-card";
        link.href = categoryHref(category.id);
        link.style.setProperty("--card-accent", category.accent || "#166534");
        link.innerHTML = `
          <div class="card-body">
            <div>
              <h2 class="category-title">${category.title}</h2>
              <p class="category-description">${category.description}</p>
            </div>
            <div class="category-meta">
              <span class="pill">${category.items.length} 个文件</span>
              <span class="pill">${formatBytes(totalSize(category))}</span>
            </div>
          </div>
        `;
        categoryGrid.append(link);
      });
    }

    function showError(error) {
      stats.innerHTML = '<span class="stat">清单加载失败</span>';
      categoryGrid.innerHTML = `<p class="state">无法读取 downloads/manifest.json：${error.message}</p>`;
    }

    fetch(manifestUrl, { cache: "no-store" })
      .then((response) => {
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }
        return response.json();
      })
      .then(render)
      .catch(showError);
  </script>
</body>
</html>
