<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>下载分类</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f6f8;
      --panel: #ffffff;
      --text: #17202a;
      --muted: #5d6876;
      --line: #d9dee7;
      --soft: #eef2f6;
      --accent: #166534;
      --accent-strong: #0f4f2a;
      --danger: #b42318;
      --shadow: 0 14px 34px rgba(23, 32, 42, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.5;
    }

    main {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0 36px;
    }

    a {
      color: var(--accent-strong);
    }

    h1,
    h2,
    h3,
    p {
      margin: 0;
    }

    .topbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .back {
      display: inline-flex;
      align-items: center;
      min-height: 36px;
      padding: 7px 11px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--panel);
      color: var(--text);
      font-weight: 700;
      text-decoration: none;
    }

    .nav {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .nav a {
      display: inline-flex;
      align-items: center;
      min-height: 34px;
      padding: 6px 10px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--panel);
      color: var(--text);
      font-size: 14px;
      font-weight: 700;
      text-decoration: none;
    }

    .nav a[aria-current="page"] {
      border-color: var(--accent);
      background: color-mix(in srgb, var(--accent) 10%, #ffffff);
      color: var(--accent-strong);
    }

    header {
      display: grid;
      gap: 14px;
      margin-bottom: 22px;
      padding-bottom: 22px;
      border-bottom: 1px solid var(--line);
    }

    h1 {
      font-size: clamp(28px, 4.5vw, 44px);
      line-height: 1.08;
      letter-spacing: 0;
    }

    .lead {
      max-width: 760px;
      color: var(--muted);
      font-size: 16px;
    }

    .stats {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      color: var(--muted);
      font-size: 14px;
    }

    .stat,
    .tag {
      display: inline-flex;
      align-items: center;
      min-height: 30px;
      padding: 5px 9px;
      border-radius: 999px;
      background: var(--soft);
      color: #263241;
      font-weight: 700;
    }

    .downloads {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
    }

    .item {
      display: grid;
      gap: 14px;
      align-content: space-between;
      min-height: 230px;
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .thumb {
      width: 100%;
      aspect-ratio: 16 / 9;
      object-fit: cover;
      border-radius: 6px;
      background: var(--soft);
    }

    .name {
      margin-bottom: 8px;
      font-size: 17px;
      line-height: 1.25;
      letter-spacing: 0;
      overflow-wrap: anywhere;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      color: var(--muted);
      font-size: 13px;
    }

    .hash {
      padding: 10px;
      border-radius: 6px;
      background: var(--soft);
      color: #263241;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 12px;
      overflow-wrap: anywhere;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 40px;
      padding: 9px 14px;
      border-radius: 6px;
      background: var(--accent);
      color: #ffffff;
      font-weight: 800;
      text-decoration: none;
    }

    .button:hover,
    .button:focus {
      background: var(--accent-strong);
    }

    .state {
      padding: 18px;
      border: 1px dashed var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: var(--muted);
    }

    .state.error {
      border-color: color-mix(in srgb, var(--danger) 35%, var(--line));
      color: var(--danger);
    }

    @media (max-width: 980px) {
      .downloads {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 640px) {
      main {
        width: min(100% - 24px, 1180px);
        padding: 22px 0 30px;
      }

      .topbar {
        align-items: stretch;
      }

      .back,
      .nav a,
      .button {
        width: 100%;
      }

      .nav {
        width: 100%;
      }

      .downloads {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main>
    <div class="topbar">
      <a class="back" href="index.html">返回首页</a>
      <nav class="nav" id="categoryNav" aria-label="下载分类"></nav>
    </div>

    <header>
      <h1 id="categoryTitle">下载分类</h1>
      <p class="lead" id="categoryDescription">正在读取 downloads/manifest.json。</p>
      <div class="stats" id="categoryStats" aria-live="polite"></div>
    </header>

    <section class="downloads" id="downloads" aria-label="下载列表">
      <p class="state">正在加载文件列表。</p>
    </section>

    <noscript>
      <p class="state">此页面需要 JavaScript 读取下载清单。你仍可直接访问 public/downloads/ 下的分类目录。</p>
    </noscript>
  </main>

  <script>
    const manifestUrl = "downloads/manifest.json";
    const params = new URLSearchParams(window.location.search);
    const requestedType = params.get("type") || "debian";
    const nav = document.querySelector("#categoryNav");
    const title = document.querySelector("#categoryTitle");
    const description = document.querySelector("#categoryDescription");
    const stats = document.querySelector("#categoryStats");
    const downloads = document.querySelector("#downloads");

    function formatBytes(bytes) {
      const units = ["B", "KB", "MB", "GB"];
      let value = Number(bytes);
      let unitIndex = 0;
      while (value >= 1024 && unitIndex < units.length - 1) {
        value /= 1024;
        unitIndex += 1;
      }
      return `${value >= 10 || unitIndex === 0 ? value.toFixed(0) : value.toFixed(1)} ${units[unitIndex]}`;
    }

    function encodePath(path) {
      return path.split("/").map(encodeURIComponent).join("/");
    }

    function categoryHref(id) {
      return `category.html?type=${encodeURIComponent(id)}`;
    }

    function totalSize(category) {
      return category.items.reduce((sum, item) => sum + item.size, 0);
    }

    function renderNav(categories, activeId) {
      nav.innerHTML = "";
      categories.forEach((category) => {
        const link = document.createElement("a");
        link.href = categoryHref(category.id);
        link.textContent = category.title;
        if (category.id === activeId) {
          link.setAttribute("aria-current", "page");
        }
        nav.append(link);
      });
    }

    function renderStats(category) {
      stats.innerHTML = "";
      [`${category.items.length} 个文件`, `${formatBytes(totalSize(category))} 总大小`].forEach((text) => {
        const item = document.createElement("span");
        item.className = "stat";
        item.textContent = text;
        stats.append(item);
      });
    }

    function renderItem(item) {
      const article = document.createElement("article");
      article.className = "item";

      if (item.kind === "JPEG Image") {
        const image = document.createElement("img");
        image.className = "thumb";
        image.src = encodePath(item.path);
        image.alt = "";
        image.loading = "lazy";
        article.append(image);
      }

      const body = document.createElement("div");
      const heading = document.createElement("h2");
      heading.className = "name";
      heading.textContent = item.filename;
      body.append(heading);

      const meta = document.createElement("div");
      meta.className = "meta";
      [item.kind, formatBytes(item.size), ...item.tags].forEach((text) => {
        const tag = document.createElement("span");
        tag.className = "tag";
        tag.textContent = text;
        meta.append(tag);
      });
      body.append(meta);
      article.append(body);

      const hash = document.createElement("div");
      hash.className = "hash";
      hash.textContent = `SHA-256 ${item.sha256}`;
      article.append(hash);

      const link = document.createElement("a");
      link.className = "button";
      link.href = encodePath(item.path);
      link.download = item.filename;
      link.textContent = "下载";
      article.append(link);

      return article;
    }

    function render(manifest) {
      const categories = manifest.categories || [];
      const category = categories.find((entry) => entry.id === requestedType);
      renderNav(categories, category ? category.id : "");

      if (!category) {
        title.textContent = "未找到分类";
        description.textContent = `清单中不存在 type=${requestedType} 的分类。`;
        stats.innerHTML = "";
        downloads.innerHTML = '<p class="state error">请从首页选择一个可用分类。</p>';
        return;
      }

      document.documentElement.style.setProperty("--accent", category.accent || "#166534");
      document.title = `${category.title} - 脚本与工具下载`;
      title.textContent = category.title;
      description.textContent = category.description;
      renderStats(category);
      downloads.innerHTML = "";
      category.items.forEach((item) => downloads.append(renderItem(item)));
    }

    function showError(error) {
      title.textContent = "清单加载失败";
      description.textContent = "无法读取 downloads/manifest.json。";
      stats.innerHTML = "";
      downloads.innerHTML = `<p class="state error">${error.message}</p>`;
    }

    fetch(manifestUrl, { cache: "no-store" })
      .then((response) => {
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }
        return response.json();
      })
      .then(render)
      .catch(showError);
  </script>
</body>
</html>
